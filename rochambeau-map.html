// ==================== LANE COLORS ====================
const LANE_COLORS = {navy:'#3a8fd0',lauzun:'#c86a18',washington:'#c8a864',main:'#50b890',annapolis:'#9070c8',artillery:'#c85050'};

// ==================== MAP SETUP ====================
const map = L.map('map',{zoomControl:true}).setView([39.5,-76.0],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://carto.com">CARTO</a> &copy; OpenStreetMap',maxZoom:19}).addTo(map);

const routeLayers = {};
const markerLayers = {};

Object.keys(LANE_COLORS).forEach(laneId=>{
  const color = LANE_COLORS[laneId];
  const lineGroup = L.layerGroup().addTo(map);
  const markerGroup = L.layerGroup().addTo(map);

  const pts = CAMPS.filter(c=>c.lane===laneId&&c.lat&&c.lng).sort((a,b)=>a.dateStart.localeCompare(b.dateStart)).map(c=>[c.lat,c.lng]);
  if(pts.length>1)L.polyline(pts,{color,weight:3,opacity:0.85}).addTo(lineGroup);

  CAMPS.filter(c=>c.lane===laneId&&c.lat&&c.lng).forEach(c=>{
    const m = L.circleMarker([c.lat,c.lng],{
      radius:c.key?7:5,
      color:'#fff',
      fillColor:color,
      fillOpacity:0.9,
      weight:c.key?3:2
    }).addTo(markerGroup);

    c.marker = m;               // ← direct reference for reliable highlight
    m.bindPopup(`<b>${c.name}</b><br><small>${c.dateStart}</small>`);
    m.bindTooltip(c.name,{permanent:false,direction:'top'});
    m.on('click',()=>showPanel(c));
  });

  routeLayers[laneId] = lineGroup;
  markerLayers[laneId] = markerGroup;
});

// Connector from Belvoir to artillery route
const belvoir = CAMPS.find(c=>c.id==='a03');
const easton = CAMPS.find(c=>c.id==='art_easton');
if(belvoir && easton){
  L.polyline([[belvoir.lat,belvoir.lng],[easton.lat,easton.lng]],{color:'#c85050',weight:3,opacity:0.7,dashArray:'5,5'}).addTo(map);
}

// Great Split marker
const balt = CAMPS.find(c=>c.id==='c28');
if(balt){
  L.marker([balt.lat,balt.lng],{icon:L.divIcon({className:'split-icon',html:'🚩 GREAT SPLIT',iconSize:[80,20]})}).addTo(map)
    .bindPopup('<b>THE GREAT SPLIT – Baltimore, 13–14 Sep 1781</b><br>• Infantry → Annapolis (ships)<br>• Lauzun Hussars → Georgetown (fast cavalry)<br>• Artillery + wagons → Bowie / Bladensburg (overland)');
}

// Legend
const legendDiv = document.getElementById('legend');
Object.keys(LANE_COLORS).forEach(id=>{
  const names = {navy:"De Grasse Fleet",lauzun:"Lauzun's Legion",washington:"Washington's Party",main:"Main Allied Army",annapolis:"Infantry → Annapolis",artillery:"Artillery → Georgetown (via Bowie)"};
  const row = document.createElement('div');row.className='leg-item';
  row.innerHTML = `<div class="leg-dot" style="background:${LANE_COLORS[id]}"></div><span>${names[id]}</span>`;
  row.onclick = () => {
    const visible = routeLayers[id].getLayers()[0].options.opacity > 0.2;
    const op = visible ? 0.15 : 0.85;
    routeLayers[id].eachLayer(l=>l.setStyle({opacity:op}));
    markerLayers[id].eachLayer(m=>m.setStyle({opacity:op,fillOpacity:op}));
    row.style.opacity = visible ? 0.4 : 1;
  };
  legendDiv.appendChild(row);
});

// Date slider
const slider = document.getElementById('date-slider');
const label = document.getElementById('date-label');
const startDate = new Date('1781-06-11');
const endDate = new Date('1781-10-19');
const totalDays = Math.floor((endDate - startDate)/86400000) + 1;
slider.max = totalDays - 1;

function updateMapForDay(dayOffset){
  const current = new Date(startDate); current.setDate(current.getDate() + dayOffset);
  label.textContent = current.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  CAMPS.forEach(c=>{
    const campDate = new Date(c.dateStart);
    const visible = campDate <= current;
    if(c.marker){
      c.marker.setStyle({opacity:visible?1:0.25,fillOpacity:visible?0.9:0.25});
    }
  });
}
slider.oninput = () => updateMapForDay(parseInt(slider.value));

// Panel with Prev/Next
let currentCampId = null;
function showPanel(c){
  currentCampId = c.id;
  const panel = document.getElementById('side-panel');
  document.getElementById('panel-name').innerHTML = c.name + (c.key?' <span style="color:#c8a864">★ KEY EVENT</span>':'') + (c.num?' <span style="color:#c8a864">[Camp '+c.num+']</span>':'');
  document.getElementById('panel-date').textContent = c.dateStart===c.dateEnd ? c.dateStart : `${c.dateStart} – ${c.dateEnd}`;
  document.getElementById('panel-notes').innerHTML = c.notes||'No additional notes.';
  const links = document.getElementById('panel-links');
  links.innerHTML = `<a href="${c.source}" target="_blank" style="color:#c8a864">→ Primary Source</a><br>${c.w3r?`<a href="${c.w3r}" target="_blank" style="color:#50c8a0">→ W3R-US Encampment</a><br>`:''}${c.hmdb?`<a href="${c.hmdb}" target="_blank" style="color:#b898f8">→ HMDB Marker</a>`:''}`;
  panel.classList.add('on');

  // SYNC TIMELINE SLIDER
  const campDate = new Date(c.dateStart);
  const offset = Math.floor((campDate - startDate) / 86400000);
  slider.value = Math.max(0, Math.min(totalDays - 1, offset));
  updateMapForDay(offset);

  // ZOOM + HIGHLIGHT (now guaranteed to work)
  if(c.lat && c.lng){
    map.flyTo([c.lat, c.lng], 13, {duration: 0.8});
    if(c.marker){
      c.marker.openPopup();
    }
  }
}
function closePanel(){
  document.getElementById('side-panel').classList.remove('on');
  currentCampId = null;
  map.closePopup();
}
function prevCamp(){
  if(!currentCampId) return;
  const currentIndex = CAMPS.findIndex(x=>x.id===currentCampId);
  if(currentIndex > 0) showPanel(CAMPS[currentIndex-1]);
}
function nextCamp(){
  if(!currentCampId) return;
  const currentIndex = CAMPS.findIndex(x=>x.id===currentCampId);
  if(currentIndex < CAMPS.length-1) showPanel(CAMPS[currentIndex+1]);
}

function resetMap(){map.flyTo([39.5,-76.0],6);slider.value=0;updateMapForDay(0);}

// Load
window.onload = () => {
  updateMapForDay(0);
  const bowie = CAMPS.find(c=>c.id==='art_bowie');
  if(bowie) map.flyTo([bowie.lat,bowie.lng],12);
};
</script>
